version: "3.9"
services:
   website1:
     build: ./website1/
     container_name: server1
   website2:
     build: ./website2/
     container_name: server2
   nginx-lb:
     image: nginx
     container_name: nginx-lb
     ports:
      - 80:80
      - 443:443

     volumes:
        - ./nginx/nginx.conf:/etc/nginx/nginx.conf
        - ./certbot/conf:/etc/letsencrypt
        - ./certbot/www:/var/www/certbot
     depends_on:
       - website1
       - website2
